---
- name: Configuration nodev/nosuid/noexec sur /tmp (ANSSI R22)
  mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: defaults,nodev,nosuid,noexec
    state: mounted

- name: Configuration nodev/nosuid/noexec sur /dev/shm
  mount:
    path: /dev/shm
    src: tmpfs
    fstype: tmpfs
    opts: defaults,nodev,nosuid,noexec
    state: mounted

- name: Permissions strictes sur fichiers sensibles
  file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: '/etc/passwd',  owner: root, group: root, mode: '0644' }
    - { path: '/etc/shadow',  owner: root, group: shadow, mode: '0640' }
    - { path: '/etc/group',   owner: root, group: root, mode: '0644' }
    - { path: '/etc/gshadow', owner: root, group: shadow, mode: '0640' }
    - { path: '/etc/crontab', owner: root, group: root, mode: '0600' }
    - { path: '/etc/cron.d',  owner: root, group: root, mode: '0700' }

- name: Restriction accès aux répertoires cron
  file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0700"
  loop:
    - /etc/cron.hourly
    - /etc/cron.daily
    - /etc/cron.weekly
    - /etc/cron.monthly
