---
- name: Configuration politique de mots de passe du domaine (ANSSI R31)
  win_shell: |
    Import-Module ActiveDirectory
    Set-ADDefaultDomainPasswordPolicy `
      -Identity "{{ ad_domain_name }}" `
      -MinPasswordLength {{ ad_password_policy.min_length }} `
      -MaxPasswordAge (New-TimeSpan -Days {{ ad_password_policy.max_age_days }}) `
      -MinPasswordAge (New-TimeSpan -Days {{ ad_password_policy.min_age_days }}) `
      -PasswordHistoryCount {{ ad_password_policy.history_count }} `
      -ComplexityEnabled ${{ ad_password_policy.complexity | ternary('true', 'false') }} `
      -LockoutThreshold {{ ad_password_policy.lockout_threshold }} `
      -LockoutDuration (New-TimeSpan -Minutes {{ ad_password_policy.lockout_duration_minutes }}) `
      -LockoutObservationWindow (New-TimeSpan -Minutes {{ ad_password_policy.lockout_observation_window_minutes }})
  delegate_to: "{{ groups['domain_controllers'][0] }}"
  run_once: true

- name: Politique de mots de passe renforcée pour les admins (Fine-Grained)
  win_shell: |
    Import-Module ActiveDirectory
    $pso = Get-ADFineGrainedPasswordPolicy -Filter { Name -eq "PSO_Admins" } -ErrorAction SilentlyContinue
    if (-not $pso) {
      New-ADFineGrainedPasswordPolicy `
        -Name "PSO_Admins" `
        -Precedence 10 `
        -MinPasswordLength 16 `
        -MaxPasswordAge (New-TimeSpan -Days 60) `
        -MinPasswordAge (New-TimeSpan -Days 1) `
        -PasswordHistoryCount 24 `
        -ComplexityEnabled $true `
        -LockoutThreshold 3 `
        -LockoutDuration (New-TimeSpan -Minutes 60) `
        -LockoutObservationWindow (New-TimeSpan -Minutes 60) `
        -ReversibleEncryptionEnabled $false
      Add-ADFineGrainedPasswordPolicySubject -Identity "PSO_Admins" -Subjects "GRP_Admins_SI"
    }
  delegate_to: "{{ groups['domain_controllers'][0] }}"
  run_once: true
