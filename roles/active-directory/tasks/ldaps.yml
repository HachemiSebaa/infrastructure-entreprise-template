---
- name: Vérification certificat LDAPS existant
  win_shell: |
    $cert = Get-ChildItem Cert:\LocalMachine\My | Where-Object {
      $_.Subject -match "{{ inventory_hostname }}" -and
      $_.EnhancedKeyUsageList.ObjectId -contains "1.3.6.1.5.5.7.3.1"
    }
    if ($cert) { "EXISTS" } else { "MISSING" }
  register: ldaps_cert_check
  changed_when: false
  when: ad_ldaps_enabled

- name: Génération certificat auto-signé pour LDAPS
  win_shell: |
    $cert = New-SelfSignedCertificate `
      -DnsName "{{ inventory_hostname }}", "{{ ad_domain_name }}" `
      -CertStoreLocation "Cert:\LocalMachine\My" `
      -KeyUsage DigitalSignature, KeyEncipherment `
      -KeyAlgorithm RSA `
      -KeyLength 4096 `
      -HashAlgorithm SHA256 `
      -NotAfter (Get-Date).AddYears(3) `
      -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.1")
    Write-Host $cert.Thumbprint
  when:
    - ad_ldaps_enabled
    - ldaps_cert_check.stdout | trim == "MISSING"

- name: Forcer LDAP signing (ANSSI — éviter LDAP en clair)
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\NTDS\Parameters
    name: LDAPServerIntegrity
    data: 2
    type: dword

- name: Désactivation LDAP non signé côté client
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\ldap
    name: LDAPClientIntegrity
    data: 2
    type: dword

- name: Activation LDAP Channel Binding
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\NTDS\Parameters
    name: LdapEnforceChannelBinding
    data: 2
    type: dword
