---
- name: Ajout dépôt Grafana
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana

- name: Ajout clé GPG Grafana
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Installation Grafana
  apt:
    name: grafana
    state: present
    update_cache: true

- name: Déploiement configuration Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Ouverture port Grafana (réseau monitoring uniquement)
  ufw:
    rule: allow
    port: "{{ grafana_port }}"
    proto: tcp
    src: "10.0.3.0/24"

- name: Activation Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: true
